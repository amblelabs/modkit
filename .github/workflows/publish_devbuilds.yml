name: Automated Builds

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Restore DataGen cache
      id: cache-restore
      uses: actions/cache/restore@v4
      with:
        path: src/main/generated
        key: datagen-${{ github.run_id }}
        restore-keys:
          datagen-

    - name: Run DataGen
      run: ./gradlew --configuration-cache runDatagen
    
    - name: Save DataGen cache
      id: cache-save
      uses: actions/cache/save@v4
      with:
        path: src/main/generated
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}

    - name: Build
      run: ./gradlew --configuration-cache build

    - name: Publish artifacts
      uses: drtheodor/discord-webhook-upload-action@v0.4
      with:
        url: ${{ secrets.DEV_BUILDS }}
        username: librarian
        avatar: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRD8DyTHxubVIbpkJDGuYBUvMzLXpA-yH6k2w&s'
        
        message: |
          <:new1:1253371736510959636><:new2:1253371805734015006> New <:al_logo:1492686347666980944> **AmbleKit** (**modkit**) dev build [**`#${{ github.run_number }}`**](<https://github.com/amblelabs/modkit/actions/runs/${{ github.run_id }}>):
          ${commits}
          
        file: |
          build/libs/*.jar
          !build/libs/*-sources.jar

    - name: Send failure notice
      if: failure()
      uses: drtheodor/discord-webhook-upload-action@v0.4
      with:
        url: ${{ secrets.DEV_BUILDS }}
        username: librarian
        avatar: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRD8DyTHxubVIbpkJDGuYBUvMzLXpA-yH6k2w&s'
        
        message: |
          <:al_error:1513885241339678852> New <:al_logo:1492686347666980944> **AmbleKit** (**modkit**) dev build [**`#${{ github.run_number }}`**](<https://github.com/amblelabs/modkit/actions/runs/${{ github.run_id }}>) **failed** to build! <a:al_explosion:1467652202356150272>

  jitpack:
    runs-on: ubuntu-latest
    steps:
    - run: |
        curl "https://jitpack.io/api/builds/dev.amblelabs/modkit/${GITHUB_SHA:0:10}" -H 'dnt: 1'
